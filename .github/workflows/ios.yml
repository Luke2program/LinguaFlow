name: iOS Tests
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build app and test bundles
        run: xcodebuild build-for-testing -project LinguaFlow.xcodeproj -scheme LinguaFlow -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' -parallel-testing-enabled NO
      - name: Run deterministic unit tests
        run: xcodebuild test -project LinguaFlow.xcodeproj -scheme LinguaFlow -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=latest' -only-testing:LinguaFlowTests -parallel-testing-enabled NO
